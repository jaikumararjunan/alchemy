global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: alchemy

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Docker container metrics via cAdvisor
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 30s

  # Node (host) metrics
  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]
