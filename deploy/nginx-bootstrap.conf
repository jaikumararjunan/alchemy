# =============================================================================
# Alchemy — Bootstrap Nginx Config (HTTP only, no SSL required)
# Used only for initial SSL cert issuance via certbot.
# After certs are obtained, switch to nginx.conf (the full SSL config).
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name akilamirthya.in 213.199.38.90;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything else to the app (HTTP access while SSL is pending)
    location / {
        proxy_pass         http://alchemy:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket
    location /ws {
        proxy_pass         http://alchemy:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    access_log /var/log/nginx/alchemy_access.log;
    error_log  /var/log/nginx/alchemy_error.log warn;
}
