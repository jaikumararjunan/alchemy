# =============================================================================
# Alchemy — Nginx Configuration (HTTP mode — no SSL yet)
# =============================================================================

limit_req_zone  $binary_remote_addr zone=api:10m   rate=60r/m;
limit_req_zone  $binary_remote_addr zone=trade:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name akilamirthya.in 213.199.38.90;

    # Docker embedded DNS — resolves upstream names at request time, not startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_vary on;

    # Connection limits per IP
    limit_conn perip 20;

    # ── Dashboard ─────────────────────────────────────────────────────────────
    location / {
        set $upstream http://alchemy:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        set $upstream http://alchemy:8000;
        proxy_pass         $upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Trade endpoints (stricter rate limit) ─────────────────────────────────
    location ~ ^/api/(trade|bot/control) {
        limit_req zone=trade burst=5 nodelay;
        limit_req_status 429;

        set $upstream http://alchemy:8000;
        proxy_pass        $upstream;
        proxy_http_version 1.1;
        proxy_set_header  Host             $host;
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        set $upstream http://alchemy:8000;
        proxy_pass        $upstream;
        proxy_http_version 1.1;
        proxy_set_header  Host             $host;
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        set $upstream http://alchemy:8000;
        proxy_pass       $upstream/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Grafana ───────────────────────────────────────────────────────────────
    location /grafana/ {
        set $grafana http://grafana:3000;
        proxy_pass         $grafana/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/alchemy_access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/alchemy_error.log warn;
}
