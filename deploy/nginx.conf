# =============================================================================
# Alchemy — Nginx Production Configuration
# Place at: /etc/nginx/conf.d/alchemy.conf
# or mount via Docker: ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
# =============================================================================

# Rate limiting zones
limit_req_zone  $binary_remote_addr zone=api:10m    rate=60r/m;
limit_req_zone  $binary_remote_addr zone=trade:10m  rate=10r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name akilamirthya.in;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name akilamirthya.in;

    # ── TLS ────────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/alchemy/live/akilamirthya.in/fullchain.pem;
    ssl_certificate_key /etc/ssl/alchemy/live/akilamirthya.in/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"                   always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # Connection limits per IP
    limit_conn perip 20;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Static dashboard ───────────────────────────────────────────────────────
    location = / {
        proxy_pass         http://alchemy:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache dashboard HTML for 30s
        proxy_cache_valid 200 30s;
    }

    # ── WebSocket endpoint ─────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://alchemy:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;    # Keep WS connections alive
        proxy_send_timeout 86400s;

        # No rate limiting for WebSocket
    }

    # ── Trade endpoints (stricter rate limit) ──────────────────────────────────
    location ~ ^/api/(trade|bot/control) {
        limit_req zone=trade burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://alchemy:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── General API ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://alchemy:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check (no rate limit, no auth) ──────────────────────────────────
    location /health {
        proxy_pass http://alchemy:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Grafana (internal monitoring UI) ──────────────────────────────────────
    location /grafana/ {
        # Restrict to VPN / office IPs in production
        # allow 10.0.0.0/8;
        # deny all;

        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/alchemy_access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/alchemy_error.log warn;
}
