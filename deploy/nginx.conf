# =============================================================================
# Alchemy — Nginx Configuration (HTTP + HTTPS with SSL)
# =============================================================================

limit_req_zone  $binary_remote_addr zone=api:10m   rate=60r/m;
limit_req_zone  $binary_remote_addr zone=trade:10m rate=10r/m;
limit_req_zone  $binary_remote_addr zone=auth:10m  rate=10r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── HTTP — redirect to HTTPS (or serve directly if no SSL yet) ───────────────
server {
    listen 80;
    listen [::]:80;
    server_name akilamirthya.in 213.199.38.90;

    # Certbot ACME challenge (needed for initial cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name akilamirthya.in;

    ssl_certificate     /etc/letsencrypt/live/akilamirthya.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akilamirthya.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/akilamirthya.in/chain.pem;

    # Modern TLS config
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # Docker embedded DNS — resolves upstream names at request time, not startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_vary on;

    # Connection limits per IP
    limit_conn perip 20;

    # ── Auth endpoints (strict rate limit — brute-force protection) ────────────
    location ~ ^/api/auth/(login|verify-2fa) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        set $upstream http://alchemy:8000;
        proxy_pass        $upstream;
        proxy_http_version 1.1;
        proxy_set_header  Host             $host;
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # ── Dashboard ─────────────────────────────────────────────────────────────
    location / {
        set $upstream http://alchemy:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        set $upstream http://alchemy:8000;
        proxy_pass         $upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Trade endpoints (stricter rate limit) ─────────────────────────────────
    location ~ ^/api/(trade|bot/control) {
        limit_req zone=trade burst=5 nodelay;
        limit_req_status 429;

        set $upstream http://alchemy:8000;
        proxy_pass        $upstream;
        proxy_http_version 1.1;
        proxy_set_header  Host             $host;
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        set $upstream http://alchemy:8000;
        proxy_pass        $upstream;
        proxy_http_version 1.1;
        proxy_set_header  Host             $host;
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        set $upstream http://alchemy:8000;
        proxy_pass       $upstream/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Grafana ───────────────────────────────────────────────────────────────
    location /grafana/ {
        set $grafana http://grafana:3000;
        proxy_pass         $grafana/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/alchemy_access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/alchemy_error.log warn;
}
