name: Deploy to Production

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Deploy in DRY_RUN mode?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: production
  cancel-in-progress: false    # never cancel a running deploy

jobs:
  # ── Build & Push Image ───────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_HOST }}/alchemy
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_HOST }}/alchemy:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_HOST }}/alchemy:buildcache,mode=max

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deploy files
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.prod.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/alchemy/
          scp -i ~/.ssh/deploy_key \
            deploy/nginx.conf \
            deploy/prometheus.yml \
            deploy/promtail.yml \
            deploy/loki.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/alchemy/deploy/
          scp -i ~/.ssh/deploy_key -r \
            scripts/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/alchemy/

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash /opt/alchemy/deploy/deploy.sh $IMAGE_TAG $DRY_RUN"

      - name: Inject auth secrets into .env
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENVSSH'
          ENV_FILE="/opt/alchemy/.env"
          set_env() {
            local key="$1" val="$2"
            if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
            else
              echo "${key}=${val}" >> "$ENV_FILE"
            fi
          }
          set_env "AUTH_ENABLED"       "${{ secrets.AUTH_ENABLED || 'true' }}"
          set_env "AUTH_USERNAME"      "${{ secrets.AUTH_USERNAME || 'admin' }}"
          set_env "AUTH_PASSWORD_HASH" "${{ secrets.AUTH_PASSWORD_HASH }}"
          set_env "JWT_SECRET_KEY"     "${{ secrets.JWT_SECRET_KEY }}"
          set_env "TOTP_SECRET"        "${{ secrets.TOTP_SECRET }}"
          echo "Auth secrets injected into .env"
          ENVSSH

      - name: Health check
        run: |
          sleep 15
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "curl -sf http://localhost:8000/health | python3 -m json.tool"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Alchemy deployed successfully — `${{ needs.build.outputs.image_tag }}`",
              "channel": "#deployments"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Alchemy deploy FAILED — `${{ needs.build.outputs.image_tag }}`\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "channel": "#deployments"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
